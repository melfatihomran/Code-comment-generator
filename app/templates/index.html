<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Code Comment Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="window">

    <div class="tabbar">
      <div class="tab active">
        <span class="dot" id="unsaved-dot"></span>
        <span class="tab-name">snippet.py</span>
      </div>
      <div class="tabbar-label">codet5-small &middot; fine-tuned on CodeSearchNet</div>
    </div>

    <div class="editor">
      <div class="ghost-row" id="ghost-row">
        <span class="gutter-spacer" id="ghost-gutter"></span>
        <span class="ghost-text" id="ghost-text"></span>
      </div>

      <div class="code-row">
        <div class="gutter" id="gutter"><div>1</div></div>
        <textarea
          id="code-input"
          spellcheck="false"
          wrap="off"
          placeholder="def add(a, b):&#10;    return a + b"
        ></textarea>
      </div>
    </div>

    <div class="statusbar">
      <div class="status-left">
        <label for="beams">beams</label>
        <input id="beams" type="number" min="1" max="8" value="4" />
      </div>
      <button id="generate-btn">
        <svg viewBox="0 0 16 16" width="11" height="11" aria-hidden="true"><path d="M3 1.5v13l11-6.5z" fill="currentColor"/></svg>
        <span id="btn-label">Run</span>
      </button>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <script>
    const codeInput = document.getElementById("code-input");
    const gutter = document.getElementById("gutter");
    const ghostGutter = document.getElementById("ghost-gutter");
    const ghostText = document.getElementById("ghost-text");
    const beamsInput = document.getElementById("beams");
    const btn = document.getElementById("generate-btn");
    const btnLabel = document.getElementById("btn-label");
    const errorBox = document.getElementById("error");
    const unsavedDot = document.getElementById("unsaved-dot");

    function syncGutter() {
      const lineCount = Math.max(1, codeInput.value.split("\n").length);
      const current = gutter.children.length;
      if (lineCount > current) {
        for (let i = current + 1; i <= lineCount; i++) {
          const d = document.createElement("div");
          d.textContent = i;
          gutter.appendChild(d);
        }
      } else if (lineCount < current) {
        while (gutter.children.length > lineCount) {
          gutter.removeChild(gutter.lastChild);
        }
      }
    }

    function syncScroll() {
      gutter.scrollTop = codeInput.scrollTop;
    }

    codeInput.addEventListener("input", () => {
      syncGutter();
      unsavedDot.classList.add("visible");
      ghostText.textContent = "";
      document.getElementById("ghost-row").classList.remove("visible");
    });
    codeInput.addEventListener("scroll", syncScroll);
    syncGutter();

    async function generate() {
      const code = codeInput.value.trim();
      errorBox.classList.add("hidden");

      if (!code) {
        errorBox.textContent = "Paste some code first.";
        errorBox.classList.remove("hidden");
        return;
      }

      btn.disabled = true;
      btnLabel.textContent = "Generating";
      btn.classList.add("running");

      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            code: code,
            num_beams: parseInt(beamsInput.value, 10) || 4,
          }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Generation failed.");
        }

        const data = await res.json();
        ghostGutter.textContent = "";
        ghostText.textContent = "# " + data.comment;
        document.getElementById("ghost-row").classList.add("visible");
        unsavedDot.classList.remove("visible");
      } catch (e) {
        errorBox.textContent = e.message;
        errorBox.classList.remove("hidden");
      } finally {
        btn.disabled = false;
        btnLabel.textContent = "Run";
        btn.classList.remove("running");
      }
    }

    btn.addEventListener("click", generate);
  </script>
</body>
</html>
